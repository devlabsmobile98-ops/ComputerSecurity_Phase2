<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote Guard — Register Voter</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="page">
    <div class="shell center-card">

      <nav class="navbar">
        <div class="brand">
          <img class="brand-logo" src="./assets/vote_guard_logo.png" alt="Vote Guard logo" />
          <div class="brand-text">
            <h2>Vote Guard</h2>
            <p>Admin registration portal</p>
          </div>
        </div>
        <div class="nav-links">
          <a class="nav-link" href="admin-dashboard.html">🏡 Dashboard</a>
          <span id="navSession"></span>
        </div>
      </nav>

      <section class="card stack">
        <div class="section-header">
          <h1 class="section-title">Register a Voter</h1>
          <p class="section-desc">Register a verified voter wallet on-chain and in the secure registry. This requires a MetaMask transaction from the admin wallet.</p>
        </div>

        <div class="stat" style="padding: 16px 20px;">
          <span class="stat-label">Admin Wallet</span>
          <span class="stat-value" style="font-size:1rem; word-break:break-all;" id="adminAddressText">Loading…</span>
        </div>

        <div>
          <label class="field-label" for="voterAddress">Voter Wallet Address</label>
          <input id="voterAddress" type="text" placeholder="0x…" />
        </div>

        <div>
          <label class="field-label" for="region">Region</label>
          <select id="region">
            <option value="">Select a region…</option>
            <option value="Durham">Durham</option>
            <option value="Toronto">Toronto</option>
            <option value="Peel">Peel</option>
            <option value="York">York</option>
            <option value="Ottawa">Ottawa</option>
            <option value="Hamilton">Hamilton</option>
            <option value="Waterloo">Waterloo</option>
            <option value="default">Other / Default</option>
          </select>
        </div>

        <div class="button-row">
          <button class="primary-btn" id="registerBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Register Voter
          </button>
          <a class="button ghost-btn" href="admin-dashboard.html">Cancel</a>
        </div>

        <div id="registerOutput" class="output info">Ready for admin registration.</div>
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/register.js"></script>
</body>
</html>

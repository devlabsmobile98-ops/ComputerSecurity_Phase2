<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote Guard — Voter Dashboard</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="page">
    <div class="shell">

      <nav class="navbar">
        <div class="brand">
          <img class="brand-logo" src="./assets/vote_guard_logo.png" alt="Vote Guard logo" />
          <div class="brand-text">
            <h2>Vote Guard</h2>
            <p>Your voter dashboard</p>
          </div>
        </div>
        <div class="nav-links">
          <a class="nav-link" href="cast-vote.html">🗳️ Cast Vote</a>
          <span id="navSession"></span>
        </div>
      </nav>

      <section class="grid-3">
        <div class="stat">
          <span class="stat-label">Role</span>
          <span class="stat-value" id="roleValue">VOTER</span>
        </div>
        <div class="stat">
          <span class="stat-label">Registration</span>
          <span class="stat-value" id="registeredValue">Checking…</span>
        </div>
        <div class="stat">
          <span class="stat-label">Vote Status</span>
          <span class="stat-value" id="votedValue">Checking…</span>
        </div>
      </section>

      <div class="spacer"></div>

      <section class="card stack">
        <div class="section-header">
          <h1 class="section-title">Your Voting Status</h1>
          <p class="section-desc">Check whether your wallet is registered and whether you have already cast your vote.</p>
        </div>

        <div id="statusOutput" class="output info">Loading voter status…</div>

        <div class="button-row">
          <a class="button primary-btn" href="cast-vote.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Cast Your Vote
          </a>
          <button class="ghost-btn" id="refreshStatusBtn">↻ Refresh Status</button>
        </div>
      </section>

    </div>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/voter-dashboard.js"></script>
</body>
</html>
